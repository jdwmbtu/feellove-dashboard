<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNOW Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; }
        h1 { text-align: center; }
        .metrics { display: flex; justify-content: space-around; flex-wrap: wrap; margin: 30px 0; font-size: 1.5em; }
        .box { border: 3px solid #333; border-radius: 12px; padding: 20px; margin: 10px; text-align: center; min-width: 220px; background: #f9f9f9; }
        .gantt { margin-top: 40px; }
        .gantt-header { display: grid; grid-template-columns: 150px repeat(24, 1fr); font-weight: bold; border-bottom: 3px solid #333; padding: 10px 0; background: #f0f0f0; }
        .hour { text-align: center; font-size: 0.8em; }
        .employee-row { display: grid; grid-template-columns: 150px repeat(24, 1fr); margin: 5px 0; align-items: center; }
        .employee-name { font-weight: bold; padding-left: 10px; }
        .timeline { display: grid; grid-template-columns: repeat(24, 1fr); height: 40px; position: relative; background: #eee; border-radius: 6px; }
        .shift-bar { position: absolute; height: 32px; background: #4CAF50; border-radius: 6px; color: white; text-align: center; line-height: 32px; font-size: 0.9em; }
        .print-btn { display: block; margin: 50px auto; padding: 20px 50px; font-size: 2em; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <h1>SNOW Dashboard – <span id="today"></span></h1>

    <div class="metrics no-print">
        <div class="box">Today Sales: $<span id="today-sales">loading…</span></div>
        <div class="box">Goal: $<span id="goal">loading…</span></div>
        <div class="box">Yesterday Sales: $<span id="yesterday-sales">loading…</span></div>
    </div>

    <h2 id="tomorrow-title">Tomorrow’s Schedule (loading…)</h2>
    <div id="gantt-chart" class="gantt">Loading schedule…</div>

    <button class="print-btn no-print" onclick="window.print()">PRINT THIS PAGE</button>

    <script>
        const sheetId = "1whPL4X-I815XVKbeFDxEHbhHbddUtb1XwsSE7MUaWYo";
        const salesTab = "Net Sales";
        const scheduleTab = "Schedule-SNOW";

        document.getElementById("today").textContent = new Date().toLocaleDateString("en-US", { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // Load sales metrics (you can adjust these row indices if needed)
        fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${salesTab}`)
            .then(r => r.text())
            .then(csv => {
                const lines = csv.split("\n");
                document.getElementById("today-sales").textContent = lines[1]?.split(",")[6]?.replace(/"/g,"") || "–";
                document.getElementById("goal").textContent = lines[2]?.split(",")[6]?.replace(/"/g,"") || "–";
                document.getElementById("yesterday-sales").textContent = lines[3]?.split(",")[6]?.replace(/"/g,"") || "–";

                // Find tomorrow from Net Sales (first row where SNOW column is blank)
                let tomorrowDate = "";
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].replace(/"/g,"").split(",");
                    const snowSales = row[6] || "";
                    if (snowSales.trim() === "") {
                        const mmddyyyy = row[2]; // column C = date in M/D/YYYY or MM/DD/YYYY
                        const [m,d,y] = mmddyyyy.split("/");
                        tomorrowDate = new Date(y, m-1, d).toLocaleDateString("en-US", { month: 'short', day: 'numeric', year: 'numeric' }).replace(/ \d{4}/, ", $&");
                        document.getElementById("tomorrow-title").textContent = `Tomorrow’s Schedule – ${new Date(y, m-1, d).toLocaleDateString("en-US", { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' })}`;
                        break;
                    }
                }
                loadSchedule(tomorrowDate);
            });

        function loadSchedule(targetDateShort) {
            if (!targetDateShort) {
                document.getElementById("gantt-chart").innerHTML = "<p>No upcoming day without sales found.</p>";
                return;
            }
            fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${scheduleTab}`)
                .then(r => r.text())
                .then(csv => {
                    const rows = csv.split("\n").slice(1);
                    const shifts = rows.map(row => {
                        const cols = row.replace(/"/g,"").split(",");
                        return {
                            date: cols[0].trim(),
                            employee: cols[2].trim(),
                            start: cols[3].trim(),
                            end: cols[4].trim()
                        };
                    }).filter(s => s.date === targetDateShort);

                    if (shifts.length === 0) {
                        document.getElementById("gantt-chart").innerHTML = "<p>No shifts scheduled for tomorrow.</p>";
                        return;
                    }

                    let html = `<div class="gantt-header">
                        <div></div>
                        ${Array.from({length:24},(_,i)=>`<div class="hour">${i}:00</div>`).join('')}
                    </div>`;

                    shifts.sort((a,b) => a.start.localeCompare(b.start)).forEach(shift => {
                        const [sh, sm] = shift.start.split(":").map(Number);
                        const [eh, em] = shift.end.split(":").map(Number);
                        const startHour = sh + sm/60;
                        const endHour = eh + em/60;
                        const left = (startHour / 24) * 100;
                        const width = Math.max((endHour - startHour) / 24 * 100, 2); // min width

                        html += `<div class="employee-row">
                            <div class="employee-name">${shift.employee}</div>
                            <div class="timeline">
                                <div class="shift-bar" style="left:${left}%; width:${width}%;">${shift.start} – ${shift.end}</div>
                            </div>
                        </div>`;
                    });

                    document.getElementById("gantt-chart").innerHTML = html;
                });
        }
    </script>
</body>
</html>
